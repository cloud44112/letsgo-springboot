<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>내 일정 상세 - Let's GO!</title>
    <link rel="stylesheet" type="text/css" href="/css/mySchedule.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
    <script src="/js/myScheduleDetail.js" defer></script>
</head>
<body>

<header class="site-header">
    <div class="logo">
        <a href="/" title="Let's GO! 홈">
            <img src="/img/logo.png" alt="Let's GO!" class="site-logo"/>
        </a>
    </div>
    <ul class="menu">
        <li><a href="/">홈</a></li>
        <li><a href="/leisureUI">플레이스 조회</a></li>
        <li><a href="/postScheduleListUI">일정게시판</a></li>
        <li><a href="/myScheduleListUI">내일정</a></li>
        <li class="user-name">강X회 님</li>
        <li><a href="/logoutAction">로그아웃</a></li>
    </ul>
</header>

<div class="layout-wrapper">

    <aside class="sidebar">
        <ul>
            <li><button><a href="/myScheduleRouteManageUI">동선관리</a></button></li>
            <li><button><a href="/myScheduleBudgetDetailUI">예산관리</a></button></li>
            <li><button><a href="/myScheduleTodoListUI">To-Do 리스트</a></button></li>
        </ul>
        <div>
            <button type="button" id="dateEditBtn">날짜 수정</button>
            <div id="dateEditForm" style="display:none; margin-top:6px;">
                <form action="/updateStartAt" method="get">
                    <input type="date" name="startAt" id="startAtInput" value="2026-04-16" required/>
                    <button type="submit">확인</button>
                    <button type="button" id="dateCancelBtn">취소</button>
                </form>
            </div>
            <button><a href="/myScheduleShareUI">공유하기</a></button>
            <button type="button" id="deleteBtn">삭제하기</button>
        </div>
    </aside>

    <main>
        <div class="content-container">

            <div class="content-left">
                <div class="schedule-header">
                    <input type="text" name="title" id="scheduleTitleInput"
                           value="수원 당일치기 여행"
                           placeholder="일정 제목을 입력하세요"
                           class="title-input"/>
                    <button type="button" id="saveTitleBtn" class="save-title-btn">수정</button>
                </div>

                <ul id="sortableList">
                    <li th:each="item : ${scheduleRoute}"
                        class="sortable-item"
                        th:data-visit-id="${item.visitId}">
                        <span th:text="${item.visitOrder} + '. ' + ${item.title}">1. 수원 화성</span>
                        <button type="button"
                                class="delete-visit-btn"
                                th:onclick="|deleteVisit('${item.visitId}')|">×</button>
                    </li>
                </ul>

                <div class="content-left-bottom">
                    <button type="button" id="updateRouteBtn">수정하기</button>
                    <button type="button" id="addVisitBtn">추가하기</button>
                </div>
            </div>

            <div class="divider"></div>

            <div class="content-right">
                <div class="content-right-top">
                    <div class="map-area">
                        <div class="map-empty">📍 지도 미리보기 (예시)</div>
                    </div>
                </div>
                <div class="content-right-bottom">
                    1. 수원 화성<br/>
                    2. 수원 떡볶이 거리<br/>
                    3. 광교호수공원<br/>
                    4. 진 호텔 수원<br/>
                </div>
            </div>

        </div>
    </main>
</div>

</body>
</html>
